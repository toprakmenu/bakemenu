<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EKMEKLER • Toprak Bakery House</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#f3f3f3;
}

.topbar{
position:sticky;
top:0;
background:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #ddd;
z-index:10;
}

.back{
color:#2b2b2b;
text-decoration:none;
font-weight:900;
}

.page-title{
font-weight:1000;
letter-spacing:.6px;
text-align:center;
flex:1;
}

.spacer{width:60px}

.wrap{
max-width:720px;
margin:0 auto;
padding:14px 14px calc(60px + env(safe-area-inset-bottom));
}

.item{
display:flex;
align-items:center;
gap:12px;
padding:12px;
border:1px solid #e2e2e2;
background:#fff;
border-radius:14px;
text-decoration:none;
color:inherit;
margin-bottom:10px;
cursor:pointer;
}

.item__img{
width:72px;
height:72px;
border-radius:12px;
object-fit:cover;
border:1px solid #e2e2e2;
background:#f7f7f7;
flex:0 0 72px;
}

.item__body{flex:1;}
.item__name{font-weight:900;font-size:15px;}
.item__desc{margin-top:4px;color:#7a7a7a;font-size:13px;}
.item__price{font-weight:1000;white-space:nowrap;padding-left:8px;}

/* LIGHTBOX */
.lightbox{
position:fixed;
inset:0;
z-index:9999;
display:flex;
align-items:center;
justify-content:center;
padding:16px;
opacity:0;
visibility:hidden;
pointer-events:none;
transition:opacity .18s ease,visibility 0s linear .18s;
}

.lightbox.is-open{
opacity:1;
visibility:visible;
pointer-events:auto;
transition:opacity .18s ease,visibility 0s linear 0s;
}

.lb-backdrop{
position:absolute;
inset:0;
background:rgba(0,0,0,.65);
opacity:0;
transition:opacity .18s ease;
}

.lightbox.is-open .lb-backdrop{opacity:1;}

.lb-panel{
position:relative;
width:min(92vw,560px);
transform:translateY(10px) scale(.985);
transition:transform .20s ease;
z-index:2;
}

.lightbox.is-open .lb-panel{
transform:translateY(0) scale(1);
}

.lb-card{
background:#fff;
border-radius:22px;
overflow:hidden;
border:1px solid rgba(255,255,255,.35);
box-shadow:0 24px 60px rgba(0,0,0,.30);
}

.lb-img{
display:block;
width:100%;
height:auto;
background:#fff;
}

.lb-meta{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
padding:14px 16px 16px;
border-top:1px solid rgba(0,0,0,.08);
}

.lb-title{
font-weight:1000;
font-size:22px;
line-height:1.1;
}

.lb-price{
font-weight:1000;
font-size:22px;
color:#c48a3a;
white-space:nowrap;
}

.lb-close{
position:absolute;
top:12px;
right:12px;
width:50px;
height:50px;
border-radius:999px;
border:2px solid rgba(196,138,58,.95);
background:rgba(0,0,0,.40);
color:#fff;
font-size:22px;
display:grid;
place-items:center;
cursor:pointer;
}
</style>
</head>

<body>

<header class="topbar">
<a class="back" href="index.html" onclick="if(history.length>1){history.back(); return false;}">
  ← GERİ
</a>
<div class="page-title">EKMEKLER</div>
<div class="spacer"></div>
</header>

<main class="wrap">

<a class="item" href="javascript:void(0)"
data-title="Ekşi Mayalı Köy Ekmeği"
data-price-key="eksiMayaliKoyEkmegi"
data-img="images/eksimayaekmek.webp">
<img class="item__img" src="images/eksimayaekmek.webp" alt="Ekşi Mayalı Köy Ekmeği">
<div class="item__body">
<div class="item__name">Ekşi Mayalı Köy Ekmeği</div>
<div class="item__desc">(Cevizli veya zeytinli sipariş edilebilir)</div>
</div>
<div class="item__price"></div>
</a>

<a class="item" href="javascript:void(0)"
data-title="Ekşi Mayalı Siyez Ekmeği"
data-price-key="eksiMayaliSiyezEkmegi"
data-img="images/siyezekmek.webp">
<img class="item__img" src="images/siyezekmek.webp" alt="Ekşi Mayalı Siyez Ekmeği">
<div class="item__body">
<div class="item__name">Ekşi Mayalı Siyez Ekmeği</div>
<div class="item__desc">(Sipariş üzerine üretim yapılır)</div>
</div>
<div class="item__price"></div>
</a>

<a class="item" href="javascript:void(0)"
data-title="Ekşi Mayalı Karabuğday Ekmeği (Glutensiz)"
data-price-key="eksiMayaliKarabugdayEkmegi"
data-img="images/karabugdayekmeği.webp">
<img class="item__img" src="images/karabugdayekmeği.webp" alt="Ekşi Mayalı Karabuğday Ekmeği">
<div class="item__body">
<div class="item__name">Ekşi Mayalı Karabuğday Ekmeği (Glutensiz)</div>
<div class="item__desc">(Sipariş üzerine üretim yapılır)</div>
</div>
<div class="item__price"></div>
</a>

<a class="item" href="javascript:void(0)"
data-title="Brioche Ekmeği"
data-price-key="briocheEkmegi"
data-img="images/briochekmek.webp">
<img class="item__img" src="images/briochekmek.webp" alt="Brioche Ekmeği">
<div class="item__body">
<div class="item__name">Brioche Ekmeği</div>
<div class="item__desc">(Sipariş üzerine üretim yapılır)</div>
</div>
<div class="item__price"></div>
</a>

</main>

<div id="lb" class="lightbox" aria-hidden="true">
<div class="lb-backdrop" id="lbBackdrop"></div>

<div class="lb-panel">
<button class="lb-close" id="lbClose" aria-label="Kapat">✕</button>

<div class="lb-card">
<img id="lbImg" class="lb-img" alt="">

<div class="lb-meta">
<div id="lbTitle" class="lb-title"></div>
<div id="lbPrice" class="lb-price"></div>
</div>

</div>
</div>
</div>

<script src="prices.js"></script>

<script>
const lb=document.getElementById("lb");
const lbBackdrop=document.getElementById("lbBackdrop");
const lbClose=document.getElementById("lbClose");
const lbImg=document.getElementById("lbImg");
const lbTitle=document.getElementById("lbTitle");
const lbPrice=document.getElementById("lbPrice");

let scrollY=0;

function formatPrice(value){
if(value === undefined || value === null || value === ""){
return "";
}

return `${value} TL`;
}

function loadPrices(){
document.querySelectorAll(".item").forEach(item=>{
const priceKey=item.dataset.priceKey;
const priceValue=prices[priceKey];
const formattedPrice=formatPrice(priceValue);

item.dataset.price=formattedPrice;

const priceElement=item.querySelector(".item__price");

if(priceElement){
priceElement.textContent=formattedPrice;
}
});
}

function lockScroll(){
scrollY=window.scrollY||0;
document.body.style.position="fixed";
document.body.style.top=`-${scrollY}px`;
document.body.style.left="0";
document.body.style.right="0";
document.body.style.width="100%";
}

function unlockScroll(){
document.body.style.position="";
document.body.style.top="";
document.body.style.left="";
document.body.style.right="";
document.body.style.width="";
window.scrollTo(0,scrollY);
}

function openLB({img,title,price,alt}){
lbImg.src=img;
lbImg.alt=alt||title||"";
lbTitle.textContent=title||"";
lbPrice.textContent=price||"";
lb.classList.add("is-open");
lb.setAttribute("aria-hidden","false");
lockScroll();
}

function closeLB(){
lb.classList.remove("is-open");
lb.setAttribute("aria-hidden","true");
lbImg.src="";
unlockScroll();
}

loadPrices();

document.querySelectorAll(".item").forEach(item=>{
item.addEventListener("click",(event)=>{
event.preventDefault();

openLB({
img:item.dataset.img,
title:item.dataset.title,
price:item.dataset.price,
alt:item.querySelector("img")?.alt||""
});
});
});

lbClose.addEventListener("click",closeLB);
lbBackdrop.addEventListener("click",closeLB);

document.addEventListener("keydown",(event)=>{
if(event.key==="Escape" && lb.classList.contains("is-open")){
closeLB();
}
});
</script>

</body>
</html>
