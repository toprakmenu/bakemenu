<style>
body{
  margin:0;

  background:#f3f3f3;

/* HERO HEADER */
.hero{
  position:relative;
  width:100%;
  height:320px;
  overflow:hidden;
  border-bottom-left-radius:0;
  border-bottom-right-radius:0;
  touch-action:pan-y;
}

.hero__slider{
  position:absolute;
  inset:0;
}

.hero__slide{
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity .8s ease;
  pointer-events:none;
}

.hero__slide.is-active{
  opacity:1;
}

.hero__img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.hero__overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,.15), rgba(0,0,0,.55));
  z-index:1;
}

.hero__topbar{
  position:absolute;
  top:12px;
  left:14px;
  z-index:3;
  color:#fff;
  font-weight:800;
  padding:8px 12px;
  border-radius:12px;
  background:rgba(0,0,0,.25);
  border:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(8px);
}

.hero__content{
  position:absolute;
  left:16px;
  right:16px;
  bottom:36px;
  z-index:3;
  color:#fff;
}

.hero__pill{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.25);
  font-size:13px;
  margin-bottom:10px;
}

.hero__title{
  font-weight:1000;
  font-size:28px;
  line-height:1.05;
  text-shadow:0 10px 30px rgba(0,0,0,.35);
}

.hero__subtitle{
  margin-top:6px;
  font-size:16px;
  opacity:.92;
}

.hero__dots{
  position:absolute;
  left:50%;
  bottom:14px;
  transform:translateX(-50%);
  z-index:3;
  display:flex;
  gap:8px;
}

.hero__dot{
  width:8px;
  height:8px;
  border-radius:999px;
  background:rgba(255,255,255,.45);
  border:1px solid rgba(255,255,255,.35);
  transition:all .25s ease;
  cursor:pointer;
}

.hero__dot.is-active{
  width:22px;
  background:#fff;
}

@media (max-width:420px){
  .hero{height:280px;}
  .hero__title{font-size:28px;}
}

/* INFO */
.info{
  margin:10px 12px 8px;
  padding:14px 14px;
  background:#fff;
  border:1px solid #e6e6e6;
  border-radius:16px;
}

.info__title{
  font-weight:1000;
  font-size:18px;
  color:#2b2b2b;
}

.info__sub{
  margin-top:4px;
  color:#7a7a7a;
  font-weight:600;
  font-size:14px;
}

/* GRID */
.grid{
  padding:8px 12px 12px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.card{
  position:relative;
  height:170px;
  border-radius:14px;
  overflow:hidden;
  background:#ccc;
}

.card img{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.card span{
  position:absolute;
  bottom:10px;
  left:10px;
  color:white;
  font-weight:900;
  text-shadow:0 0 10px rgba(0,0,0,.7);
  z-index:2;
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(0,0,0,.6) 100%);
  z-index:1;
}

.site-footer{
  width:100%;
  text-align:center;
  padding:40px 0 60px;
  color:#7a7a7a;
  font-weight:800;
  letter-spacing:.6px;
}
</style>
</head>

<script>
(function(){
  const slides = document.querySelectorAll(".hero__slide");
  const dots = document.querySelectorAll(".hero__dot");
  const hero = document.getElementById("hero");
  let current = 0;
  const total = slides.length;
  let intervalId = null;

  function showSlide(index){
    slides.forEach((slide, i) => {
      slide.classList.toggle("is-active", i === index);
    });
    dots.forEach((dot, i) => {
      dot.classList.toggle("is-active", i === index);
    });
    current = index;
  }

  function nextSlide(){
    let next = current + 1;
    if(next >= total) next = 0;
    showSlide(next);
  }

  function prevSlide(){
    let prev = current - 1;
    if(prev < 0) prev = total - 1;
    showSlide(prev);
  }

  function startAuto(){
    stopAuto();
    intervalId = setInterval(nextSlide, 4000);
  }

  function stopAuto(){
    if(intervalId){
      clearInterval(intervalId);
      intervalId = null;
    }
  }

  dots.forEach(dot => {
    dot.addEventListener("click", () => {
      const index = Number(dot.dataset.index);
      showSlide(index);
      startAuto();
    });
  });

  let startX = 0;
  let startY = 0;
  let isTouching = false;

  hero.addEventListener("touchstart", (e) => {
    const touch = e.touches[0];
    startX = touch.clientX;
    startY = touch.clientY;
    isTouching = true;
    stopAuto();
  }, {passive:true});

  hero.addEventListener("touchend", (e) => {
    if(!isTouching) return;
    const touch = e.changedTouches[0];
    const diffX = touch.clientX - startX;
    const diffY = touch.clientY - startY;

    if(Math.abs(diffX) > 40 && Math.abs(diffX) > Math.abs(diffY)){
      if(diffX < 0){
        nextSlide();
      }else{
        prevSlide();
      }
    }

    isTouching = false;
    startAuto();
  }, {passive:true});

  hero.addEventListener("mouseenter", stopAuto);
  hero.addEventListener("mouseleave", startAuto);

  showSlide(0);
  startAuto();
})();
</script>
