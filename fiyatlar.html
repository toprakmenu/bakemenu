<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Fiyat Yönetimi • Toprak Bakery House</title>

  <style>
    :root{
      --bg:#f3f3f3;
      --card:#ffffff;
      --text:#2b2b2b;
      --muted:#777777;
      --line:#e2e2e2;
      --gold:#c48a3a;
      --gold-soft:#fff4df;
      --green:#27854a;
      --red:#b83232;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(255,255,255,.97);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(10px);
      padding:12px 14px;
    }

    .topbar__inner{
      max-width:850px;
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .title{
      font-size:18px;
      font-weight:1000;
    }

    .product-count{
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
    }

    .wrap{
      max-width:850px;
      margin:0 auto;
      padding:14px 14px 80px;
    }

    .info{
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:13px 14px;
      font-size:14px;
      line-height:1.45;
      margin-bottom:12px;
    }

    .search{
      position:sticky;
      top:65px;
      z-index:15;
      padding:8px 0 12px;
      background:var(--bg);
    }

    .search input{
      width:100%;
      border:1px solid var(--line);
      border-radius:13px;
      background:#fff;
      padding:13px 14px;
      font-size:16px;
      outline:none;
    }

    .search input:focus{
      border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(196,138,58,.14);
    }

    .category{
      margin-top:18px;
    }

    .category-title{
      margin:0 0 9px;
      padding:0 2px;
      font-size:17px;
      font-weight:1000;
    }

    .price-row{
      display:grid;
      grid-template-columns:minmax(0,1fr) 120px;
      gap:12px;
      align-items:center;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:13px;
      padding:11px 12px;
      margin-bottom:8px;
      transition:.15s ease;
    }

    .price-row.changed{
      background:var(--gold-soft);
      border-color:var(--gold);
    }

    .product-name{
      min-width:0;
      font-size:14px;
      font-weight:800;
      line-height:1.25;
    }

    .price-box{
      position:relative;
    }

    .price-box input{
      width:100%;
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px 37px 10px 10px;
      font-size:16px;
      font-weight:900;
      text-align:right;
      outline:none;
      background:#fff;
    }

    .price-box input:focus{
      border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(196,138,58,.14);
    }

    .currency{
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      font-size:12px;
      font-weight:900;
      color:var(--muted);
      pointer-events:none;
    }

    .actions{
      position:sticky;
      bottom:0;
      z-index:20;
      max-width:850px;
      margin:20px auto 0;
      padding:12px 0 calc(12px + env(safe-area-inset-bottom));
      background:linear-gradient(
        to bottom,
        rgba(243,243,243,0),
        rgba(243,243,243,.96) 25%,
        rgba(243,243,243,1)
      );
    }

    .button-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    button{
      border:0;
      border-radius:13px;
      padding:13px 12px;
      font-size:15px;
      font-weight:1000;
      cursor:pointer;
    }

    .generate-button{
      background:var(--gold);
      color:#fff;
    }

    .copy-button{
      background:#2b2b2b;
      color:#fff;
    }

    .copy-button:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .reset-button{
      width:100%;
      margin-top:9px;
      background:#fff;
      border:1px solid var(--line);
      color:var(--red);
    }

    .output-section{
      display:none;
      margin-top:18px;
    }

    .output-section.visible{
      display:block;
    }

    .output-title{
      font-size:16px;
      font-weight:1000;
      margin-bottom:8px;
    }

    textarea{
      width:100%;
      min-height:360px;
      resize:vertical;
      border:1px solid var(--line);
      border-radius:13px;
      padding:13px;
      background:#171717;
      color:#f3f3f3;
      font-family:Consolas,Monaco,monospace;
      font-size:13px;
      line-height:1.5;
      outline:none;
    }

    .message{
      display:none;
      margin-top:10px;
      border-radius:11px;
      padding:11px 12px;
      font-size:14px;
      font-weight:800;
    }

    .message.success{
      display:block;
      color:var(--green);
      background:#eaf7ee;
    }

    .message.error{
      display:block;
      color:var(--red);
      background:#fdecec;
    }

    .no-result{
      display:none;
      background:#fff;
      border:1px solid var(--line);
      border-radius:13px;
      padding:18px;
      text-align:center;
      color:var(--muted);
    }

    @media(max-width:520px){
      .price-row{
        grid-template-columns:minmax(0,1fr) 105px;
        gap:8px;
      }

      .button-row{
        grid-template-columns:1fr;
      }

      .search{
        top:63px;
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <div class="topbar__inner">
      <div class="title">Fiyat Yönetimi</div>
      <div class="product-count">
        <span id="productCount">0</span> ürün
      </div>
    </div>
  </header>

  <main class="wrap">

    <div class="info">
      Fiyatları kutulardan değiştir. Ardından
      <strong>prices.js Oluştur</strong> butonuna bas.
      Oluşan kodu kopyalayıp GitHub’daki
      <strong>prices.js</strong> dosyasının tamamıyla değiştir.
    </div>

    <div class="search">
      <input
        id="searchInput"
        type="search"
        placeholder="Ürün ara..."
        autocomplete="off"
      >
    </div>

    <div id="priceContainer"></div>

    <div id="noResult" class="no-result">
      Aradığın isimde bir ürün bulunamadı.
    </div>

    <section id="outputSection" class="output-section">
      <div class="output-title">Oluşturulan prices.js kodu</div>

      <textarea
        id="outputCode"
        readonly
        spellcheck="false"
      ></textarea>

      <div id="message" class="message"></div>
    </section>

    <div class="actions">
      <div class="button-row">
        <button
          id="generateButton"
          class="generate-button"
          type="button"
        >
          prices.js Oluştur
        </button>

        <button
          id="copyButton"
          class="copy-button"
          type="button"
          disabled
        >
          Kodu Kopyala
        </button>
      </div>

      <button
        id="resetButton"
        class="reset-button"
        type="button"
      >
        Değişiklikleri Sıfırla
      </button>
    </div>

  </main>

  <script src="prices.js"></script>

  <script>
    const menuSections = [
      {
        title: "Kahvaltı",
        products: [
          ["toprakGranola", "Toprak Granola"],
          ["toprakGranolaGlutensiz", "Toprak Granola (Glutensiz)"],
          ["toprakKahvalti", "Toprak Kahvaltı"],
          ["cilbir", "Çılbır"],
          ["karpuzSimitTabagi", "Karpuz-Simit Tabağı"]
        ]
      },
      {
        title: "Tartineler",
        products: [
          ["capreseTartine", "Caprese Tartine"],
          ["avokadoTartine", "Avokado Tartine"],
          ["kozBiberTartine", "Köz Biber Tartine"],
          ["hindiFumeTartine", "Hindi Füme Tartine"],
          ["rozbifTartine", "Rozbif Tartine"],
          ["kestaneMantariTartine", "Kestane Mantarı Tartine"],
          ["karadutHellimTartine", "Karadut-Hellim Tartine"]
        ]
      },
      {
        title: "Kruvasan Sandviçler",
        products: [
          ["capreseKruvasan", "Caprese Kruvasan"],
          ["hindiFumeKruvasan", "Hindi Füme Kruvasan"],
          ["rozbifKruvasan", "Rozbif Kruvasan"],
          [
            "yumurtaliHindiFumeKruvasan",
            "Çırpılmış Yumurtalı Hindi Fümeli Kruvasan"
          ]
        ]
      },
      {
        title: "Focaccia Sandviçler",
        products: [
          ["focacciaCaprese", "Focaccia Caprese"],
          ["focacciaHindiFume", "Focaccia Hindi Füme"],
          ["focacciaRozbif", "Focaccia Rozbif"]
        ]
      },
      {
        title: "Kruvasanlar",
        products: [
          ["sadeKruvasan", "Sade Kruvasan"],
          ["patlicanliDanish", "Patlıcanlı Danish"],
          ["cikolataliKruvasan", "Çikolatalı Kruvasan"],
          ["bademliKruvasan", "Bademli Kruvasan"],
          ["ormanMeyveliDanish", "Orman Meyveli Danish"],
          [
            "pastaciKremaliCilekliKruvasan",
            "Pastacı Kremalı Çilekli Kruvasan"
          ],
          [
            "findikEzmeliMuzluKruvasan",
            "Fındık Ezmeli Muzlu Kruvasan"
          ],
          ["antepFistikliKruvasan", "Antep Fıstıklı Kruvasan"],
          [
            "antepFistikliVisneliKruvasan",
            "Antep Fıstıklı-Vişneli Kruvasan"
          ]
        ]
      },
      {
        title: "Poğaçalar",
        products: [
          ["siyezPogaca", "Siyez Poğaça"],
          ["karabugdayPogaca", "Karabuğday Poğaça"],
          ["dereotluPogaca", "Dereotlu Poğaça"]
        ]
      },
      {
        title: "Tatlılar",
        products: [
          ["cookie", "Cookie"],
          ["glutensizFrambuazBrownie", "Glutensiz Frambuaz Brownie"],
          ["tiramisu", "Tiramisu"],
          ["cheesecake", "Cheesecake"],
          ["cinnamonRoll", "Cinnamon Roll"],
          ["antepVisneRoll", "Antep-Vişne Roll"],
          ["haftaninKeki", "Haftanın Keki"],
          ["elmaliKurabiye", "Elmalı Kurabiye"]
        ]
      },
      {
        title: "Sıcak İçecekler",
        products: [
          ["cay", "Çay"],
          ["fincanCay", "Fincan Çay"],
          ["turkKahvesi", "Türk Kahvesi"],
          ["filtreKahve", "Filtre Kahve"],
          ["americano", "Americano"],
          ["espresso", "Espresso"],
          ["latte", "Latte"],
          ["cappuccino", "Cappuccino"],
          ["flatWhite", "Flat White"],
          ["cortado", "Cortado"],
          ["bitkiCaylari", "Bitki Çayları"]
        ]
      },
      {
        title: "Soğuk İçecekler",
        products: [
          ["su", "Su"],
          ["soda", "Soda"],
          ["icedAmericano", "Iced Americano"],
          ["icedLatte", "Iced Latte"],
          ["portakalliLimonata", "Portakallı Limonata"],
          ["hibiscus", "Hibiscus"],
          ["kombucha", "Kombucha"],
          ["gazoz", "Gazoz"]
        ]
      },
      {
        title: "Ekmekler",
        products: [
          ["eksiMayaliKoyEkmegi", "Ekşi Mayalı Köy Ekmeği"],
          ["eksiMayaliSiyezEkmegi", "Ekşi Mayalı Siyez Ekmeği"],
          [
            "eksiMayaliKarabugdayEkmegi",
            "Ekşi Mayalı Karabuğday Ekmeği"
          ],
          ["briocheEkmegi", "Brioche Ekmeği"]
        ]
      },
      {
        title: "Tezgah Ürünleri",
        products: [
          ["cilekReceli", "Çilek Reçeli"],
          ["acuka", "Acuka"],
          ["eksiMayaKruton", "Ekşi Maya Kruton"],
          ["granolaPaket", "Granola"],
          ["karabugdayGranola", "Karabuğday Granola"],
          ["zeytinyagiCamSise", "Zeytinyağı 500 ml Cam Şişe"],
          ["zeytinyagiMetalKutu", "Zeytinyağı 500 ml Metal Kutu"]
        ]
      },
      {
        title: "Sporcu Menüsü",
        products: [
          ["balanceBowl", "Balance Bowl"],
          ["fitPlate", "Fit Plate"],
          ["powerPlate", "Power Plate"]
        ]
      }
    ];

    const originalPrices = {...prices};

    const priceContainer =
      document.getElementById("priceContainer");

    const productCount =
      document.getElementById("productCount");

    const searchInput =
      document.getElementById("searchInput");

    const noResult =
      document.getElementById("noResult");

    const generateButton =
      document.getElementById("generateButton");

    const copyButton =
      document.getElementById("copyButton");

    const resetButton =
      document.getElementById("resetButton");

    const outputSection =
      document.getElementById("outputSection");

    const outputCode =
      document.getElementById("outputCode");

    const message =
      document.getElementById("message");

    function createPricePanel(){
      priceContainer.innerHTML = "";

      let totalProducts = 0;

      menuSections.forEach(section => {
        const categoryElement =
          document.createElement("section");

        categoryElement.className = "category";
        categoryElement.dataset.category = section.title;

        const titleElement =
          document.createElement("h2");

        titleElement.className = "category-title";
        titleElement.textContent = section.title;

        categoryElement.appendChild(titleElement);

        section.products.forEach(([key,name]) => {
          totalProducts++;

          const row =
            document.createElement("div");

          row.className = "price-row";
          row.dataset.name =
            normalizeText(`${name} ${section.title}`);

          row.innerHTML = `
            <div class="product-name">${name}</div>

            <div class="price-box">
              <input
                type="number"
                min="0"
                step="1"
                inputmode="numeric"
                data-price-key="${key}"
                value="${prices[key] ?? 0}"
                aria-label="${name} fiyatı"
              >

              <span class="currency">TL</span>
            </div>
          `;

          categoryElement.appendChild(row);
        });

        priceContainer.appendChild(categoryElement);
      });

      productCount.textContent = totalProducts;

      addInputEvents();
    }

    function addInputEvents(){
      document
        .querySelectorAll("[data-price-key]")
        .forEach(input => {
          input.addEventListener("input",() => {
            const key = input.dataset.priceKey;
            const currentValue = Number(input.value);
            const originalValue = Number(originalPrices[key]);

            input
              .closest(".price-row")
              .classList
              .toggle(
                "changed",
                currentValue !== originalValue
              );

            outputSection.classList.remove("visible");
            copyButton.disabled = true;
            clearMessage();
          });
        });
    }

    function normalizeText(value){
      return value
        .toLocaleLowerCase("tr-TR")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g,"");
    }

    function filterProducts(){
      const query =
        normalizeText(searchInput.value.trim());

      let visibleProductCount = 0;

      document
        .querySelectorAll(".category")
        .forEach(category => {
          let categoryHasVisibleProduct = false;

          category
            .querySelectorAll(".price-row")
            .forEach(row => {
              const matches =
                row.dataset.name.includes(query);

              row.style.display =
                matches ? "grid" : "none";

              if(matches){
                visibleProductCount++;
                categoryHasVisibleProduct = true;
              }
            });

          category.style.display =
            categoryHasVisibleProduct ? "block" : "none";
        });

      noResult.style.display =
        visibleProductCount === 0 ? "block" : "none";
    }

    function readCurrentPrices(){
      const currentPrices = {};

      document
        .querySelectorAll("[data-price-key]")
        .forEach(input => {
          const key = input.dataset.priceKey;
          const value = Number(input.value);

          currentPrices[key] =
            Number.isFinite(value) ? value : 0;
        });

      return currentPrices;
    }

    function createPricesCode(){
      const currentPrices = readCurrentPrices();

      const lines = [
        "const prices = {",
        ""
      ];

      menuSections.forEach(section => {
        lines.push(`    // ${section.title}`);

        section.products.forEach(([key]) => {
          lines.push(
            `    ${key}: ${currentPrices[key]},`
          );
        });

        lines.push("");
      });

      lines.push("};");

      return lines.join("\n");
    }

    function showMessage(text,type){
      message.textContent = text;
      message.className = `message ${type}`;
    }

    function clearMessage(){
      message.textContent = "";
      message.className = "message";
    }

    async function copyGeneratedCode(){
      const code = outputCode.value;

      if(!code){
        showMessage(
          "Önce prices.js kodunu oluşturmalısın.",
          "error"
        );

        return;
      }

      try{
        await navigator.clipboard.writeText(code);

        showMessage(
          "Kod panoya kopyalandı.",
          "success"
        );
      }catch(error){
        outputCode.focus();
        outputCode.select();

        const copied =
          document.execCommand("copy");

        showMessage(
          copied
            ? "Kod panoya kopyalandı."
            : "Kopyalama başarısız oldu. Kodu elle seçip kopyala.",
          copied ? "success" : "error"
        );
      }
    }

    function resetPrices(){
      document
        .querySelectorAll("[data-price-key]")
        .forEach(input => {
          const key = input.dataset.priceKey;

          input.value = originalPrices[key] ?? 0;

          input
            .closest(".price-row")
            .classList
            .remove("changed");
        });

      outputSection.classList.remove("visible");
      copyButton.disabled = true;
      outputCode.value = "";
      clearMessage();
    }

    generateButton.addEventListener("click",() => {
      outputCode.value = createPricesCode();

      outputSection.classList.add("visible");
      copyButton.disabled = false;

      clearMessage();

      outputSection.scrollIntoView({
        behavior:"smooth",
        block:"start"
      });
    });

    copyButton.addEventListener(
      "click",
      copyGeneratedCode
    );

    resetButton.addEventListener("click",() => {
      const approved = window.confirm(
        "Yaptığın fiyat değişiklikleri silinsin mi?"
      );

      if(approved){
        resetPrices();
      }
    });

    searchInput.addEventListener(
      "input",
      filterProducts
    );

    createPricePanel();
  </script>

</body>
</html>
